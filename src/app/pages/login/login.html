<div class="h-screen w-screen flex flex-col relative overflow-hidden bg-black">

  <!-- Header -->
  <div class="login-header relative z-30 w-full flex justify-between items-center px-4 sm:px-10">
    <div class="flex-1 flex items-center gap-3 sm:gap-4">
      <img src="../../../assets/logo.png" alt="Logo" class="h-10 sm:h-14 w-auto object-contain z-[60]">
      <div class="flex flex-col hidden sm:flex">
        <span class="company-name text-base sm:text-xl leading-tight">Neemus Software Solutions Hyderabad</span>
        <span class="company-sub text-[0.6rem] sm:text-[0.7rem] tracking-[0.1em] text-white">Asset
          Management System</span>
      </div>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center">
      <span class="n-asset-text italic tracking-tighter text-lg sm:text-2xl font-black leading-none">
        <span class="text-green-400">N</span><span class="text-white">-ASSET</span>
      </span>
      <span class="text-[0.55rem] sm:text-[0.65rem] text-white tracking-[0.1em] mt-1 text-center hidden md:block">
        Tracking, Auditing and Maintaining Assets using QR/RFID
      </span>
    </div>

    <div class="flex-1 hidden lg:block">
      <!-- Empty space to maintain center alignment -->
    </div>
  </div>

  <!-- Background Carousel -->
  <div class="login-bg-carousel">
    <div class="login-bg-carousel-inner"></div>
    <div class="login-bg-carousel-overlay"></div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex items-center justify-center lg:justify-end lg:pr-32 pt-24">

    <!-- Login Card -->
    <div
      class="glass-card relative z-20 w-full max-w-[420px] mx-4 p-8 sm:p-10 rounded-xl text-center animate-[fadeIn_0.7s_ease-out]">

      <h1 class="login-title mb-6 sm:mb-8">Login</h1>

      <!-- User ID -->
      <div class="input-container">
        <div class="icon-box">
          <mat-icon>person</mat-icon>
        </div>
        <input type="text" [(ngModel)]="userId" placeholder="UserName" class="login-input" />
      </div>

      <!-- Password -->
      <div class="input-container">
        <div class="icon-box">
          <mat-icon>lock</mat-icon>
        </div>
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="Password"
          class="login-input" />
      </div>

      <!-- Roles -->
      <div class="role-section">
        <label class="role-label uppercase tracking-wider">Select Login Type</label>
        <div class="role-group">
          <label *ngFor="let role of roles" class="role-item">
            <input type="radio" name="role" [value]="role" [(ngModel)]="selectedRole" class="role-radio" />
            <span>{{ role }}</span>
          </label>
        </div>
      </div>

      <!-- Login Button -->
      <button class="login-btn" (click)="onLogin()">Login</button>

      <!-- Forgot Password (Subtle) -->
      <div class="mt-4 text-right">
        <a href="javascript:void(0)" class="text-white/50 hover:text-white text-xs transition-colors">Forgot
          Password?</a>
      </div>
    </div>
  </div>

  <!-- Loader Overlay -->
  <div *ngIf="isLoading"
    class="loader-overlay fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white/95">
    <div class="relative w-64 h-64 sm:w-80 sm:h-80">
      <img src="../../../assets/NeemusAnimation.png" alt="Loading..." class="w-full h-full object-contain loader-roll">
    </div>
    <div class="mt-8 flex flex-col items-center gap-2">
      <span class="text-slate-800 font-bold text-2xl tracking-widest uppercase">Neemus </span>
      <div class="flex gap-1">
        <div class="w-2 h-2 bg-[#005696] rounded-full animate-bounce [animation-delay:-0.3s]"></div>
        <div class="w-2 h-2 bg-[#005696] rounded-full animate-bounce [animation-delay:-0.15s]"></div>
        <div class="w-2 h-2 bg-[#005696] rounded-full animate-bounce"></div>
      </div>
    </div>
  </div>
</div>
