<div class="min-h-screen bg-slate-50 p-8 flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
  <header>
    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Edit Audited Asset</h1>
    <p class="text-sm text-slate-500 font-medium mt-1">Modify details and status of assets under audit</p>
  </header>

  <app-common-card 
    title="Edit Asset Details" 
    subtitle="Update the parameters for the selected audited asset"
    icon="edit">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mb-6">
      
      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Audit Plan <span class="text-rose-500">*</span></label>
        <select [(ngModel)]="selectedAuditPlan" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
          <option value="">Select</option>
          <option value="test audit">test audit</option>
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Asset Class <span class="text-rose-500">*</span></label>
        <select [(ngModel)]="selectedAssetClass" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
          <option value="">Select</option>
          <option value="6005">6005</option>
          <option value="6003">6003</option>
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Asset</label>
        <select [(ngModel)]="selectedAsset" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
          <option value="">Select</option>
          <option value="60050039">60050039</option>
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Select Custodian</label>
        <select [(ngModel)]="selectedCustodian" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
          <option value="">Select</option>
          <option value="25482">25482</option>
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Asset Location</label>
        <select [(ngModel)]="assetLocation" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
          <option value="">Select</option>
          <option value="CIVIL DEPARTMENT">CIVIL DEPARTMENT</option>
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Remarks</label>
        <input type="text" [(ngModel)]="remarks" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900" />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-black text-slate-700 uppercase tracking-wider">Asset Status</label>
        <select [(ngModel)]="assetStatus" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 outline-none transition-all font-medium text-slate-900">
          <option value="">Select</option>
          <option value="Asset Available">Asset Available</option>
          <option value="Asset Location Transferred">Asset Location Transferred</option>
        </select>
      </div>
      
    </div>

    <div class="mt-4 flex">
      <app-button label="Update" variant="primary" width="auto" (btnClick)="onUpdate()"></app-button>
    </div>
  </app-common-card>

  <app-common-card 
    title="Audited Asset List" 
    subtitle="View all audited assets"
    icon="list_alt">
    
    <div class="mt-4">
      <app-data-table 
        title="Audited Asset List"
        [columns]="auditedAssetColumns" 
        [data]="auditedAssetData" 
        [allowGrouping]="true">
      </app-data-table>
    </div>
  </app-common-card>
</div>
