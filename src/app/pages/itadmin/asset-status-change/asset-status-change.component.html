<div class="p-6 space-y-6">

  <div class="bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden">

    <!-- Header -->
    <div class="p-6 border-b border-slate-100">
      <h2 class="text-xl font-bold text-slate-800">
        Asset Status Change
      </h2>
    </div>

    <!-- Grid -->
    <div class="p-4">

      <ejs-grid
        #grid
        id="assetStatusGrid"
        [dataSource]="assets"
        allowPaging="true"
        [pageSettings]="pageSettings"
        [editSettings]="editSettings"
        [toolbar]="toolbar"
        gridLines="Horizontal">

     <e-columns>

  <!-- Asset ID Hidden -->
  <e-column
    field="assetID"
    isPrimaryKey="true"
    [visible]="false">
  </e-column>

  <!-- Main Asset Number -->
  <e-column
    field="mainAssetNumber"
    headerText="Main Asset Number"
    width="180">
  </e-column>

  <!-- Sub Number -->
  <e-column
    field="subNumber"
    headerText="Sub Number"
    width="120">
  </e-column>

  <!-- Asset Class -->
  <e-column
    field="assetClass"
    headerText="Asset Class"
    width="180">
  </e-column>

  <!-- Asset Description -->
  <e-column
    field="assetDescription"
    headerText="Asset Description"
    width="250">
  </e-column>

  <!-- Asset Status -->
  <e-column
    field="statusCode"
    headerText="Asset Status"
    width="150">

    <ng-template #template let-data>
      <span
        class="px-3 py-1 rounded-full text-xs font-bold"
        [ngClass]="getStatusClass(data.statusCode)">
        {{ data.statusCode }}
      </span>
    </ng-template>

    <ng-template #editTemplate let-data>

      <ejs-dropdownlist
        id="statusCode"
        name="statusCode"
        [(ngModel)]="data.statusCode"
        [dataSource]="statusOptions"
        [fields]="{
          text: 'statusName',
          value: 'statusCode'
        }"
        placeholder="Select Status">

      </ejs-dropdownlist>

    </ng-template>

  </e-column>

</e-columns>

        <!-- Custom Edit/Add Dialog Template -->
        <ng-template #editSettingsTemplate let-data>
          <div class="p-4 space-y-6">

            <!-- Select Asset (Add Mode) -->
            <div *ngIf="isAddMode" class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                Select Asset <span class="text-rose-500">*</span>
              </label>
              <ejs-multicolumncombobox
                id="mainAssetNumber"
                name="mainAssetNumber"
                [(ngModel)]="data.mainAssetNumber"
                [dataSource]="assets"
                [fields]="assetFields"
                placeholder="Select Asset"
                popupHeight="220px"
                popupWidth="600px"
                showClearButton="true">
                <e-columns>
                  <e-column field="mainAssetNumber" header="MainAssetNumber" width="150"></e-column>
                  <e-column field="subNumber"       header="SubNumber"       width="100"></e-column>
                  <e-column field="assetDescription" header="AssetName"       width="250"></e-column>
                </e-columns>
              </ejs-multicolumncombobox>
            </div>

            <!-- Read-only Asset Display (Edit Mode) -->
            <div *ngIf="!isAddMode" class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                Asset
              </label>
              <input
                type="text"
                [value]="data.mainAssetNumber + ' - ' + data.assetDescription"
                disabled
                class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-500 bg-slate-50 shadow-sm outline-none cursor-not-allowed">
            </div>

            <!-- Select Status -->
            <div class="flex flex-col gap-1.5">
              <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide">
                Select Status <span class="text-rose-500">*</span>
              </label>
              <ejs-dropdownlist
                id="statusCode"
                name="statusCode"
                [(ngModel)]="data.statusCode"
                [dataSource]="statusOptions"
                [fields]="{
                  text: 'statusName',
                  value: 'statusCode'
                }"
                placeholder="Select Status">
              </ejs-dropdownlist>
            </div>

          </div>
        </ng-template>

      </ejs-grid>

    </div>

  </div>

</div>
