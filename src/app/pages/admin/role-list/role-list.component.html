<div class="p-6 bg-slate-50 min-h-screen">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    <div class="mt-4">
      <app-data-table 
        title="Assigned Roles List"
        [columns]="roleColumns" 
        [data]="data" 
        [allowGrouping]="true"
        (onEdit)="editRole($event)"
        (onDelete)="deleteRole($event)">
      </app-data-table>
    </div>
  </div>
</div>
