<div class="p-6">
    <div class="bg-white/80 backdrop-blur-md rounded-xl shadow-xl border border-slate-200 overflow-hidden">
        <!-- Header -->
        <div
            class="p-6 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-slate-50 to-white">
            <div>
                <h2 class="text-xl font-bold text-slate-800">Department Details</h2>
                <p class="text-sm text-slate-500">Manage organizational departments and their details</p>
            </div>
            <button ejs-button cssClass="e-success" iconCss="e-icons e-add" (click)="addRecord()">
                Add Department
            </button>
        </div>

        <div class="p-4">
            <ejs-grid #grid [dataSource]='departments' allowPaging='true' [pageSettings]='pageSettings'
                [editSettings]='editSettings' [toolbar]="toolbar" [allowSorting]='true' [allowFiltering]='true'
                [filterSettings]='filterSettings' (actionComplete)="actionComplete($event)" gridLines="Horizontal"
                class="border-none">
                <e-columns>
                    <e-column field='DepartmentCode' headerText='Department Code' width='150' textAlign='Right'
                        isPrimaryKey='true' [validationRules]='coderules'></e-column>
                    <e-column field='DepartmentName' headerText='Department Name' width='250'
                        [validationRules]='namerules'></e-column>
                    <e-column field='DepartmentStatus' headerText='Status' width='120'></e-column>
                    <e-column headerText='Manage Records' width='160' [commands]='commands'></e-column>
                </e-columns>
            </ejs-grid>
        </div>
    </div>
</div>
